{% extends 'base.html' %}

{% block content %}

<!-- Header-->
<header class="bg-dark py-5">
    <div class="container px-4 px-lg-5 my-5">
        <div class="text-center text-white">
            <h1 class="display-4 fw-bolder">Register</h1>
            <p class="lead fw-normal text-white-50 mb-0">Create a new account</p>
        </div>
    </div>
</header>

<!-- Main Content Area -->
<!-- flex-grow-1 ensures this section expands to fill the empty space -->
<section class="py-5 flex-grow-1">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">

                <div class="card shadow-lg border-0 rounded-lg">
                    <div class="card-header bg-success text-white text-center py-4">
                        <h3 class="mb-0">Create Account</h3>
                        <p class="mb-0">Join our community today</p>
                    </div>
                    <div class="card-body p-5">
                        <form method="post" action="{% url 'register' %}">
                            {% csrf_token %}
                            <div class="mb-4">
                                <label for="username" class="form-label fw-bold">Username</label>
                                <input type="text" class="form-control form-control-lg" name="username" placeholder="Choose a username" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label fw-bold">Password</label>
                                <input type="password" class="form-control form-control-lg" name="password" placeholder="Create a password" required>
                            </div>
                            <div class="mb-4">
                                <label for="confirm_password" class="form-label fw-bold">Confirm Password</label>
                                <input type="password" class="form-control form-control-lg" name="confirm_password" placeholder="Confirm your password" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-success btn-lg">Create Account</button>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer text-center py-3">
                        <p class="mb-0">Already have an account? <a href="{% url 'login' %}" class="text-success fw-bold">Sign in here</a></p>
                    </div>
                </div>

            </div>
        </div>
    </div>
</section>

{% endblock %}
