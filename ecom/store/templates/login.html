{% extends 'base.html' %}

{% block content %}

<!-- Header-->
<header class="py-5 header-bg-fade">
    <div class="container px-4 px-lg-5 my-5">
        <div class="text-center text-white">
            <h1 class="display-4 fw-bolder">Login</h1>
            <p class="lead fw-normal text-white-50 mb-0">Login to your Account</p>
        </div>
    </div>
</header>

<!-- Main Content Area -->
<!-- flex-grow-1 ensures this section expands to fill the empty space -->
<section class="py-5 flex-grow-1">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">

                <div class="card shadow-lg border-0 rounded-lg">
                    <div class="card-header bg-primary text-white text-center py-4">
                        <h3 class="mb-0">Welcome Back</h3>
                        <p class="mb-0">Sign in to your account</p>
                    </div>
                    <div class="card-body p-5">
                        <form method="post" action="{% url 'login' %}">
                            {% csrf_token %}
                            <div class="mb-4">
                                <label for="username" class="form-label fw-bold">Username</label>
                                <input type="text" class="form-control form-control-lg" name="username" placeholder="Enter your username" required>
                            </div>
                            <div class="mb-4">
                                <label for="password" class="form-label fw-bold">Password</label>
                                <input type="password" class="form-control form-control-lg" name="password" placeholder="Enter your password" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">Sign In</button>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer text-center py-3">
                        <p class="mb-0">Don't have an account? <a href="{% url 'register' %}" class="text-primary fw-bold">Register here</a></p>
                    </div>
                </div>

            </div>
        </div>
    </div>
</section>

{% endblock %}
