{% extends 'base.html' %}

{% block content %}

<style>
    #add-cart {
        transition: all 0.3s ease;
    }
    .product-image-container img {
        cursor: pointer;
        transition: opacity 0.3s;
    }
    .product-image-container img:hover {
        opacity: 0.8;
    }
</style>

<!-- Header-->
<header class="py-5 header-bg-fade">
    <div class="container px-4 px-lg-5 my-5">
        <div class="text-center text-white">
            <h1 class="display-4 fw-bolder">{{ product.name }}</h1>
            <a href="{% url 'category' product.category.slug %}" class="text-decoration-none">
                <p class="lead fw-normal text-white-50 mb-0">
                    {{ product.category }}
                </p>
            </a>
        </div>
    </div>
</header>

<!-- Main Content Area -->
<!-- flex-grow-1 ensures this section expands to fill the empty space -->
<section class="py-5 flex-grow-1">
    <div class="container" style="max-width: 80%;">
        <div class="row justify-content-center">
            <div class="col-lg-10">

                {% if product.is_sale %}

                <div class="product-detail-card card mb-3">
                    <div class="row g-0">
                        <div class="col-md-4 product-image-container">
                            <!-- Sale badge on image only -->
                            <div class="position-relative">
                                <img src="{{ product.image.url }}" class="img-fluid rounded-start" alt="...">
                                <div class="badge bg-light text-dark position-absolute"
                                    style="top: 0.5rem; right: 0.5rem;">Sale</div>
                            </div>
                        </div>

                        <div class="col-md-8">
                            <div class="card-body">
                                <center>
                                    <p class="card-text">
                                        <strong>Price: </strong> &nbsp;
                                        <strike class="text-danger">₹{{ product.price }}</strike>
                                        &nbsp;
                                        <span class="text-success">₹{{ product.sale_price }}</span>
                                    </p>

                                    <div class="quantity-selector justify-content-center">
                                        <label><strong>Quantity:</strong></label>
                                        <select class="form-select form-select-sm" id="qty-cart" style="width: auto;">
                                            <option value="1">1</option>
                                            <option value="2">2</option>
                                            <option value="3">3</option>
                                            <option value="4">4</option>
                                            <option value="5">5</option>
                                        </select>
                                    </div>

                                    <button type="button" value="{{ product.id }}" class="btn btn-secondary"
                                        id="add-cart">Add to Cart</button>
                                </center>
                            </div>
                        </div>
                    </div>
                </div>

                {% else %}

                <div class="product-detail-card card mb-3">
                    <div class="row g-0">
                        <div class="col-md-4 product-image-container">
                            <img src="{{ product.image.url }}" class="img-fluid rounded-start" alt="...">
                        </div>

                        <div class="col-md-8">
                            <div class="card-body">
                                <center>
                                    <p class="card-text">
                                        <strong>Price: </strong> &nbsp;
                                        <span class="text-primary">₹{{ product.price }}</span>
                                    </p>

                                    <div class="quantity-selector justify-content-center">
                                        <label><strong>Quantity:</strong></label>
                                        <select class="form-select form-select-sm" id="qty-cart" style="width: auto;">
                                            <option value="1">1</option>
                                            <option value="2">2</option>
                                            <option value="3">3</option>
                                            <option value="4">4</option>
                                            <option value="5">5</option>
                                        </select>
                                    </div>

                                    <button type="button" value="{{ product.id }}" class="btn btn-secondary"
                                        id="add-cart">Add to Cart</button>
                                </center>
                            </div>
                        </div>
                    </div>
                </div>

                {% endif %}

                <br />
                <p class="card-text justify-content-center">{{ product.description | safe }}</p>
            </div>
        </div>
    </div>
</section>

<!-- Image Modal -->
<div class="modal fade" id="imageModal" tabindex="-1" aria-labelledby="imageModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content bg-transparent border-0">
      <div class="modal-header border-0 pb-0 justify-content-end" style="position: absolute; right: 15px; top: 15px; z-index: 1055;">
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" style="background-color: white; opacity: 1; padding: 10px; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5);"></button>
      </div>
      <div class="modal-body text-center p-0">
        <img src="" id="modalImage" class="img-fluid rounded" style="max-height: 90vh; object-fit: contain;" alt="Product Image">
      </div>
    </div>
  </div>
</div>

<script>
    $(document).ready(function() {
        $('.product-image-container img').on('click', function() {
            var src = $(this).attr('src');
            $('#modalImage').attr('src', src);
            var myModal = new bootstrap.Modal(document.getElementById('imageModal'));
            myModal.show();
        });
    });

    $(document).on('click', '#add-cart', function (e) {
        e.preventDefault();

        $.ajax({
            type: 'POST',
            url: "{% url 'cart_add' %}",
            data: {
                'product_id': $(this).val(),
                'product_qty': $('#qty-cart option:selected').text(),
                'csrfmiddlewaretoken': '{{ csrf_token }}',
                'action': 'post'
            },

            success: function (json) {
                window.location.href = "{% url 'cart_summary' %}";
            },

            error: function (xhr, errmsg, err) {
                console.log(xhr.status + ": " + xhr.responseText);
            }
        });
    });
</script>

{% endblock %}
